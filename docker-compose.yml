services:
  wildtrack:
    build: .
    image: wildtrack-ai:latest
    container_name: wildtrack
    ports:
      - "8000:8000"
    volumes:
      # Persist the detection log on the host so it survives container restarts
      - ./logs:/app/logs
      # Mount detections.txt to a host file so you can inspect it live
      - ./detections.txt:/app/detections.txt
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
